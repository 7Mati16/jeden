<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
         /* Dodaj to do sekcji <style> */
.note-container {
    width: 100%;
    padding: 1.5rem; /* Mały margines na telefonie */
}

@media (min-width: 768px) {
    .note-container {
        padding: 5rem; /* Duży margines (oddech) na komputerze */
    }
}

/* Zapobieganie wystawaniu długich słów lub linków poza ekran */
.note-content {
    word-wrap: break-word;
    overflow-wrap: break-word;
    font-size: 1.1rem; /* Podstawowa wielkość na telefonie */
}

@media (min-width: 768px) {
    .note-content {
        font-size: 1.5rem; /* Większa czcionka na PC */
    }
}


        :root { 
            --bg-app: #F8FAFC; 
            --text-main: #0f172a; 
            --border: #e2e8f0; 
            --accent: #6366f1;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .dark { 
            --bg-app: #020617; 
            --text-main: #f1f5f9; 
            --border: #1e293b; 
            --accent: #818cf8;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            transition: background 0.4s ease;
            min-height: 100vh;
        }

        /* --- NAWIGACJA --- */
        .glass-nav { 
    background: rgba(255, 255, 255, 0.8); 
    backdrop-filter: blur(12px); 
    border-bottom: 1px solid var(--border);
    position: sticky; 
    top: 0; 
    z-index: 100;
    width: 100%;
    min-height: 70px; /* Minimalna wysokość, żeby nie był za chudy */
    height: auto;     /* Pozwala mu rosnąć, jeśli treść się nie mieści */
}
        .dark .glass-nav { background: rgba(2, 6, 23, 0.8); }

        /* --- GRID SYSTEM --- */
.subject-grid { 
    display: grid; 
    grid-template-columns: repeat(1, 1fr); /* Jeden kafelek na całą szerokość na małym tel */
    gap: 1rem; 
}

@media (min-width: 640px) { 
    .subject-grid { grid-column-gap: 1.5rem; grid-template-columns: repeat(2, 1fr); } 
}

@media (min-width: 1024px) { 
    .subject-grid { grid-template-columns: repeat(4, 1fr); } 
    .col-span-3-custom { grid-column: span 3 / span 3; }
}

        /* --- KAFELKI --- */
        .subject-card { 
            height: 160px; 
            padding: 2rem; 
            border-radius: 2.5rem; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .subject-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        .subject-icon {
            position: absolute;
            bottom: -0.5rem;
            right: 0.5rem;
            font-size: 4.5rem;
            transition: all 0.5s ease;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
            opacity: 0.8;
            pointer-events: none;
        }
        .subject-card:hover .subject-icon {
            transform: scale(1.2) rotate(-15deg);
            opacity: 1;
        }

        /* --- FORMATOWANIE NOTATEK --- */
        .format-wazne { 
            border-left: 10px solid #ef4444; 
            background: rgba(239, 68, 68, 0.1); 
            padding: 2.5rem; 
            margin: 2.5rem 0; 
            border-radius: 0 2.5rem 2.5rem 0; 
            font-weight: 600;
            font-size: 1.1em;
        }
        .format-pomin { text-decoration: underline wavy #94a3b8; opacity: 0.4; font-style: italic; }
        .format-img-container { 
            margin: 3rem 0; 
            border-radius: 2.5rem; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); 
            border: 10px solid white; 
        }
        .dark .format-img-container { border-color: #1e293b; }

        /* --- FISZKI 3D --- */
        .fiszka-card { perspective: 2000px; width: 100%; height: 450px; cursor: pointer; }
        .fiszka-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        .fiszka-card.flipped .fiszka-inner { transform: rotateY(-180deg); }
        .fiszka-front, .fiszka-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 4rem; padding: 3rem; font-size: 2.8rem; font-weight: 800; text-align: center; 
        }
        .fiszka-front { background: white; color: #0f172a; box-shadow: var(--card-shadow); }
        .dark .fiszka-front { background: #1e293b; color: white; }
        .fiszka-back { transform: rotateY(-180deg); background: var(--accent); color: white; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); }

        /* --- UI COMPONENTS --- */
        .search-input {
            width: 100%;
            padding: 1.5rem 2rem;
            border-radius: 2rem;
            background: white;
            border: 3px solid var(--border);
            outline: none;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .dark .search-input { background: #0f172a; color: white; border-color: #1e293b; }
        .search-input:focus { border-color: var(--accent); transform: scale(1.01); }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 1.25rem 2rem;
            border-radius: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }

        .page-enter { animation: pageFade 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 1000; display: flex; flex-direction: column; gap: 1rem; }
        .toast { 
            padding: 1.5rem 2.5rem; border-radius: 2rem; background: #0f172a; color: white; font-weight: 800;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-left: 8px solid var(--accent);
            animation: toastIn 0.5s ease forwards;
        }
        @keyframes toastIn { from { transform: translateX(150%); } to { transform: translateX(0); } }
    </style>
</head>

    "content": "**1. Biblia**\n\n[w]**Biblia** to księga będąca - obok cywilizacji antycznej - jednym z najważniejszych źródeł kultury europejskiej [/w]\n\nNazwa pochodzi od greckiego wyrazu biblia ( l.m od biblion)\n-------------------------------------------------------\n\nW piśmie świętym można znaleźć wiele imion nazw miejscowości, opisów wydarzeń i zwyczajów. \n\nWystępuje w nim wiele gatunków należących do epiki ( list, przypowieść) i liryki ( pieśń, psalm). Zróżnicowana narracja, bogactwo symboli, alegorii, oszczędność w ujawnianiu motywacji psychologicznych postaci, zmuszają do twórczego czytania Biblii\n\nDla chrześcijan i wyznawców judaizmu Biblia to księga święta, przedstawiająca opis historii zbawienia. Zaczyna się od stworzenia świata i pierwszych ludzi przed Boga , a kończy opisem męki i zmartwychwstania Jezusa i wizją końca dziejów.\n\nBiblia może być źródłem refleksji etycznych dla ludzi niewierzących lub wyznawców innych religii\n\n| **Biblia jako:** |\n| **Źródło historyczne** | nazwy miast, imiona, opisy wydarzeń i zwyczajów |\n| **Dzieło literackie** | występują w niej gatunki literackie należące do epiki i liryki |\n| **Kodeks moralny** | można interpretować biblie jako zbiór praw moralnych |\n| **Księga święta** | dla chrześcijan to księga święta przedstawiająca opis historii zbawienia |\n-\n\n|** Wybrane przekłady Biblii:**|\n|Septuaginta| najstarszy przekład starego testamentu na język grecki, pochodzi z III i II w. p.n.e. (3 i 2) |\n|Wulgata| przekład całej Biblii na łacinę, z przełomu IV i V wieku (4 i 5) |\n|Biblia Jakuba Wujka| pierwsze tłumaczenie Biblii na język polski z XVI w. (16 w.) |\n|Biblia Tysiąclecia| najpopularniejsze obecnie tłumaczenie Biblii, z 2 połowy XX stulecia |\n-\n[p]\n|**Jak odczytywać i interpretować Biblię?**|\n|Dosłownie| tekst jest rozumiany jako zapis faktów lub pouczenie|\n|Metaforycznie|  każdy wątek interpretuje jako element niosący dodatkowe znaczenia od religijne lub moralne |\n|Moralistycznie| tekst biblijny może być odczytywany jako wskazówki które pomagają zrozumieć każdemu człowiekowi jego postawę i czyny oraz sugerują jak postąpić w danej sytuacji |\n|Mistycznie| jest przyjmowane przez osoby wierzące dla których lektura Biblii oznacza obcowanie ze słowem bożym |\n[/p]\n**1.1 Księga Rodzaju**\n\n|Czas powstania| około 400 r. p. n .e. |\n|Rodzaj księgi| historyczna |\n|Autor| tekst na wiele autorów |\n|Tytuł| pierwotnie nie miała tytułu ale była nazywana od pierwszych słów tekstu Genesis |\n|Treść| Pierwsza księga starego testamentu. Zawiera historię dziejów świata od chwili gdy został on stworzony przez Boga. Pierwsze 11 rozdziałów mówi o początku świata i ludzkości |\n\nTworzenie świata:\n\n|**Dzień 1**| Stworzenie nieba, ziemi i światłości (dzień/noc) |\n|**Dzień 2**| Oddzielenie wód sklepieniem nazwanym niebem |\n|**Dzień 3**| Wyłonienie lądu (ziemia) z mórz oraz stworzenie wszelkiej roślinności |\n|**Dzień 4**| Stworzenie słońca, księżyca i gwiazd do rządzenia czasem i świecenia nad światem |\n|**Dzień 5**| Stworzenie potworów morskich, ryb oraz wszelkiego ptactwa |\n|**Dzień 6**| Stworzenie zwierząt lądowych oraz człowieka na obraz Boga |\n|**Dzień 7**| Odpoczynek Boga po trudzie i ustanowienie dnia świętym |\n\nWybrane wątki z księgi rodzaju:\n\n|**Kain i Abel**| Kain z zazdrości zabił brata, ponieważ Bóg wyżej ocenił ofiarę Abla. Kain próbował okłamać Stwórcę, za co został przeklęty i naznaczony kainowym znamieniem |\n|**Sodoma i Gomora**| Miasta zniszczone przez Boga deszczem ognia i siarki w karze za grzechy mieszkańców. Ocalał jedynie Lot z rodziną, jednak jego żona – wbrew zakazowi aniołów – obejrzała się za siebie i zamieniła w słup soli |\n|**Abraham**| Biblijny patriarcha i założyciel narodu żydowskiego, który z woli Boga wyprowadził swój lud z Mezopotamii do Palestyny. Jest symbolem jedności religii monoteistycznych |\n|**Ofiara Izaaka**| Bóg wystawił wierność Abrahama na próbę, nakazując mu poświęcić syna. W ostatniej chwili anioł powstrzymał rękę ojca. Wydarzenie to symbolizuje bezgraniczne oddanie Bogu i zapowiada ofiarę Chrystusa |\n\nMotywy i symbole w księdze rodzaju:\n\n|**Liczba 7**| liczba dni stworzenia świata, w tradycji żydowskiej oznacza doskonałość , pełnię |\n|**Rajski ogród**| miejsce idealne, z którego człowiek został wygnany za grzechy. Współcześnie symbolizuje wieczne szczęście, do którego po śmierci trafiają dusze zbawionych |\n|**Zakazany owoc (jabłko)**| symbol dobra i zła oraz norm moralnych |\n|**Wąż**| symbol zła i grzechu |",

        function showToast(msg) {
            const c = document.getElementById('toast-container');

       function parseContent(t) {
    if(!t) return "";
    return t.replace(/\[img\](.*?)\[\/img\]/gs, '<div class="format-img-container"><img src="$1" class="w-full"></div>')
            .replace(/\[w\](.*?)\[\/w\]/gs, '<div class="format-wazne">$1</div>')
            .replace(/\[p\](.*?)\[\/p\]/gs, '<span class="format-pomin">$1</span>')
            .replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-600 dark:text-indigo-400 font-extrabold">$1</strong>')
            .replace(/^\|(.*?)\|$/gm, (match, content) => {
                const cells = content.split('|').map(c => `<td class="border dark:border-slate-700 p-2 md:p-3 text-sm md:text-base font-medium">${c.trim()}</td>`).join('');
                return `<div class="overflow-x-auto my-6"><table class="w-full border-collapse bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-sm"><tr>${cells}</tr></table></div>`;
            }).replace(/<\/table><\/div>\s*<div class="overflow-x-auto my-6"><table class="w-full border-collapse bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-sm">/g, '');
}

        function renderHome() {

            });

            html += `

        // --- RENDERER: SUBJECT ---
        function renderSubject(name, filter = "") {
            const items = db.filter(i => i.subject === name && i.title.toLowerCase().includes(filter.toLowerCase()));
            let html = `
                <div class="page-enter">
                    <button onclick="renderHome()" class="mb-10 font-black text-slate-400 uppercase text-xs tracking-widest hover:text-indigo-600 transition flex items-center gap-3">← Powrót do menu</button>
                    
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
                        <div class="flex items-center gap-8">
                            <div class="w-20 h-20 rounded-[2rem] bg-gradient-to-br ${config.subjects[name].kolor} flex items-center justify-center text-5xl text-white shadow-2xl">${config.subjects[name].ikona}</div>
                            <h1 class="text-6xl font-black tracking-tighter">${name}</h1>
                        </div>
                        <button onclick="renderForm('${name}')" class="btn-primary shadow-2xl scale-110">Dodaj Lekcję</button>
                    </div>

                    <input type="text" id="searchBar" oninput="doSearch('${name}')" value="${filter}" placeholder="Szukaj tematu w przedmiotcie ${name}..." class="search-input mb-10">

                    <div class="grid gap-5">`;

            if(items.length === 0) {
                html += `<div class="p-32 text-center border-4 border-dashed border-slate-200 dark:border-slate-800 rounded-[4rem] opacity-20 font-black text-2xl uppercase tracking-widest">Brak materiałów</div>`;
            }

            items.reverse().forEach(item => {
                html += `
                    <div onclick="renderNote(${item.id})" class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] cursor-pointer flex justify-between items-center group hover:translate-x-4 transition-all shadow-sm border border-transparent hover:border-indigo-500">
                        <div class="flex items-center gap-8">
                            <div class="w-4 h-4 rounded-full bg-indigo-500 group-hover:scale-150 transition shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                            <span class="text-2xl font-extrabold tracking-tight">${item.title}</span>
                        </div>
                        <div class="flex items-center gap-6">
                            ${item.quiz?.length ? '<span class="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Quiz Ready</span>' : ''}
                            <span class="bg-slate-100 dark:bg-slate-800 px-6 py-3 rounded-2xl text-xs font-black uppercase opacity-40 tracking-widest">${item.type}</span>
                        </div>
                    </div>`;
            });
            app.innerHTML = html + `</div></div>`;
            if(filter) { const b = document.getElementById('searchBar'); b.focus(); b.setSelectionRange(filter.length, filter.length); }
        }

        function doSearch(sub) { renderSubject(sub, document.getElementById('searchBar').value); }

        // --- RENDERER: NOTE ---
        function renderNote(id) {
    const item = db.find(i => i.id === id);
    // Przewijamy na górę przy otwarciu
    window.scrollTo(0,0);

    app.innerHTML = `
        <div class="page-enter max-w-5xl mx-auto px-4 md:px-0">
            <button onclick="renderSubject('${item.subject}')" class="mb-6 md:mb-10 font-black text-slate-400 uppercase text-xs tracking-widest hover:text-indigo-600 transition flex items-center py-2">
                <span class="mr-2">←</span> Lista tematów
            </button>
            
            <div class="bg-white dark:bg-slate-900 rounded-[2rem] md:rounded-[4rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
                <div class="bg-gradient-to-r ${config.subjects[item.subject].kolor} p-10 md:p-32 text-white">
                    <span class="text-[10px] md:text-sm font-black uppercase tracking-[0.5em] opacity-60">${item.subject}</span>
                    <h1 class="text-2xl md:text-8xl font-black mt-4 md:mt-6 tracking-tighter leading-tight md:leading-[0.9]">${item.title}</h1>
                </div>

                <div class="p-6 md:p-24">
                    ${item.type === 'slowka' ? `
                        <button onclick="runFiszki(${item.id})" class="w-full bg-indigo-600 text-white py-10 md:py-16 rounded-[2rem] md:rounded-[3.5rem] font-black text-2xl md:text-5xl shadow-2xl uppercase mb-12 md:mb-24 hover:scale-[1.02] active:scale-95 transition">Trenuj Fiszki 🎴</button>
                    ` : ''}
                    
                    <div class="text-base md:text-3xl leading-relaxed opacity-90 whitespace-pre-line text-slate-800 dark:text-slate-100 break-words">
                        ${parseContent(item.content)}
                    </div>
                    
                    ${item.summary ? `
                        <div class="mt-12 md:mt-20 p-8 md:p-16 bg-amber-50 dark:bg-amber-900/10 border-l-[8px] md:border-l-[16px] border-amber-400 rounded-[2rem] md:rounded-[3rem]">
                            <span class="text-[10px] font-black uppercase tracking-widest text-amber-600 mb-4 block">Podsumowanie</span>
                            <p class="text-lg md:text-2xl font-bold italic text-amber-950 dark:text-amber-200">"${item.summary}"</p>
                        </div>
                    ` : ''}

                    ${item.quiz?.length ? `
                        <button onclick="runQuiz(${item.id})" class="w-full mt-16 md:mt-24 bg-indigo-600 text-white p-10 md:p-14 rounded-[2rem] md:rounded-[3.5rem] font-black text-xl md:text-4xl shadow-2xl uppercase tracking-tighter hover:bg-indigo-700 transition">Uruchom Quiz 🚀</button>
                    ` : ''}

                    <div class="mt-20 md:mt-32 pt-10 border-t border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6">
                        <button onclick="deleteNote(${item.id})" class="text-red-500 font-black text-xs uppercase tracking-widest hover:underline order-2 md:order-1">Usuń materiał</button>
                        <button onclick="renderForm(null, ${item.id})" class="w-full md:w-auto bg-slate-100 dark:bg-slate-800 px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest order-1 md:order-2">Edytuj treść</button>
                    </div>
                </div>
            </div>
        </div>`;
}

        // --- MODULE: FISZKI ---
        function runFiszki(id) {
            const item = db.find(i => i.id === id); 
            let idx = 0;
            const draw = () => {
                const w = item.words[idx];
                app.innerHTML = `
                    <div class="max-w-4xl mx-auto py-12 page-enter">
                        <div class="flex justify-between items-center mb-16 px-4">
                            <button onclick="renderNote(${id})" class="font-black text-slate-400 uppercase text-xs tracking-widest hover:text-indigo-600 transition">← Przerwij naukę</button>
                            <div class="px-10 py-4 bg-indigo-600 text-white rounded-full font-black text-xl shadow-lg">${idx + 1} / ${item.words.length}</div>
                        </div>
                        <div class="fiszka-card" onclick="this.classList.toggle('flipped')">
                            <div class="fiszka-inner">
                                <div class="fiszka-front dark:bg-slate-800 dark:text-white">${w.pl}</div>
                                <div class="fiszka-back">${w.en}</div>
                            </div>
                        </div>
                        <div class="flex gap-10 mt-20">
                            <button id="pB" class="flex-1 p-12 bg-white dark:bg-slate-900 rounded-[3rem] font-black uppercase text-sm tracking-widest shadow-xl transition active:scale-90">Poprzednia</button>
                            <button id="nB" class="flex-[2] bg-indigo-600 text-white p-12 rounded-[3rem] font-black uppercase text-sm tracking-widest shadow-2xl hover:bg-indigo-700 transition active:scale-95">Następna</button>
                        </div>
                    </div>`;
                document.getElementById('pB').onclick = () => { if(idx > 0) { idx--; draw(); } };
                document.getElementById('nB').onclick = () => { if(idx < item.words.length - 1) { idx++; draw(); } else { showToast("Koniec fiszek!"); renderNote(id); } };
            };
            draw();
        }

        // --- MODULE: QUIZ ---
        let qState = { id: 0, questions: [], current: 0, points: 0, locked: false };
        function runQuiz(id) {
            const item = db.find(i => i.id === id);
            qState = { 
                id, 
                questions: [...item.quiz].sort(() => Math.random() - 0.5), 
                current: 0, 
                points: 0, 
                locked: false 
            };
            renderQuestion();
        }

        function renderQuestion() {
            const q = qState.questions[qState.current];
            qState.locked = false;
            app.innerHTML = `
                <div class="max-w-4xl mx-auto py-12 page-enter text-center">
                    <p class="font-black text-indigo-500 uppercase text-xs mb-12 tracking-[0.6em]">Pytanie ${qState.current + 1} z ${qState.questions.length}</p>
                    <h2 class="text-6xl font-black mb-24 tracking-tighter leading-tight">${q.question}</h2>
                    
                    <div id="quiz-options" class="grid gap-6">
                        ${q.type === 'abcd' ? q.options.sort(() => Math.random() - 0.5).map(o => `
                            <button onclick="checkABCD(this, '${o.replace(/'/g, "\\'")}', '${q.correct.replace(/'/g, "\\'")}')" 
                                    class="p-10 bg-white dark:bg-slate-900 rounded-[2.5rem] text-3xl font-bold text-left flex items-center gap-10 shadow-sm transition border-4 border-transparent hover:border-indigo-500">
                                <div class="w-10 h-10 rounded-full border-4 border-indigo-500 flex-shrink-0"></div>
                                ${o}
                            </button>
                        `).join('') : `
                            <input type="text" id="writeIn" placeholder="Wpisz odpowiedź..." class="w-full p-12 bg-white dark:bg-slate-900 rounded-[3rem] text-5xl font-black text-center outline-none border-[12px] border-transparent focus:border-indigo-500 shadow-2xl mb-12">
                            <button onclick="checkWrite('${q.correct.replace(/'/g, "\\'")}')" class="w-full btn-primary py-12 rounded-[3rem] text-2xl shadow-2xl">Zatwierdź</button>
                        `}
                    </div>
                    <div id="feedback" class="mt-16 hidden p-14 rounded-[3.5rem] font-black text-4xl shadow-inner animate-bounce"></div>
                    <button id="nextQ" onclick="nextQ()" class="w-full mt-12 bg-indigo-600 text-white p-14 rounded-[3.5rem] font-black uppercase text-2xl hidden shadow-2xl">Następne zadanie →</button>
                </div>`;
        }

        function checkABCD(btn, val, corr) {
            if(qState.locked) return; qState.locked = true;
            const isCorrect = val === corr;
            if(isCorrect) qState.points++;
            btn.classList.add(isCorrect ? '!bg-green-500' : '!bg-red-500', '!text-white', '!border-transparent');
            document.getElementById('nextQ').classList.remove('hidden');
        }

        function checkWrite(corr) {
            const input = document.getElementById('writeIn');
            const val = input.value.trim().toLowerCase();
            if(!val || qState.locked) return; qState.locked = true;
            const isCorrect = val === corr.toLowerCase();
            if(isCorrect) qState.points++;
            input.classList.add(isCorrect ? '!border-green-500' : '!border-red-500');
            const f = document.getElementById('feedback');
            f.classList.remove('hidden');
            f.className = `mt-16 p-14 rounded-[3.5rem] font-black text-3xl ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            f.innerHTML = isCorrect ? "Brawo! Prawidłowo." : `Błąd! Poprawna odpowiedź: <br><span class="text-6xl mt-4 block">${corr}</span>`;
            document.getElementById('nextQ').classList.remove('hidden');
        }

        function nextQ() {
            qState.current++;
            if(qState.current < qState.questions.length) renderQuestion();
            else {
                app.innerHTML = `
                    <div class="page-enter py-20 text-center">
                        <div class="max-w-3xl mx-auto p-20 bg-white dark:bg-slate-900 rounded-[5rem] border-[15px] border-indigo-600 shadow-2xl">
                            <div class="text-[12rem] leading-none mb-10">🏆</div>
                            <h2 class="text-5xl font-black mb-6 uppercase tracking-tighter">Wynik Końcowy</h2>
                            <div class="text-[13rem] font-black text-indigo-600 leading-none mb-16">${qState.points}/${qState.questions.length}</div>
                            <button onclick="renderNote(${qState.id})" class="w-full btn-primary py-12 rounded-[3rem] text-3xl shadow-2xl">Wróć do lekcji</button>
                        </div>
                    </div>`;
            }
        }

        // --- FORM: CREATE & EDIT ---
        function renderForm(preSub = null, editId = null) {
            const data = editId ? db.find(i => i.id === editId) : null;
            app.innerHTML = `
                <div class="page-enter max-w-5xl mx-auto">
                    <h2 class="text-6xl font-black mb-16 text-center tracking-tighter uppercase">${editId ? 'Edytuj' : 'Nowa'} Lekcja</h2>
                    <div class="bg-white dark:bg-slate-900 rounded-[4rem] p-12 md:p-20 shadow-2xl space-y-12">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <input type="text" id="f-title" placeholder="Tytuł tematu..." value="${data?.title || ''}" class="search-input">
                            <select id="f-subject" class="search-input cursor-pointer">
                                ${Object.keys(config.subjects).map(s => `<option value="${s}" ${(preSub === s || data?.subject === s) ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                        <select id="f-type" onchange="document.getElementById('f-content').placeholder = (this.value === 'slowka' ? 'PL - EN (każde w nowej linii)' : 'Treść notatki...')" class="search-input cursor-pointer">
                            <option value="notatka" ${data?.type === 'notatka' ? 'selected' : ''}>Tryb: Notatka + Media</option>
                            <option value="slowka" ${data?.type === 'slowka' ? 'selected' : ''}>Tryb: Lista Słówek</option>
                        </select>
                        <textarea id="f-content" placeholder="Treść..." class="w-full min-h-[400px] p-10 rounded-[3rem] bg-slate-50 dark:bg-slate-800 outline-none text-2xl font-medium shadow-inner border-none">${data?.content || ''}</textarea>
                        <input type="text" id="f-summary" placeholder="Kluczowy wniosek (Złota Myśl)..." value="${data?.summary || ''}" class="search-input italic">
                        
                        <div class="pt-16 border-t border-slate-100 dark:border-slate-800">
                            <div class="flex justify-between items-center mb-12">
                                <h3 class="text-4xl font-black tracking-tighter">Zadania Quizu</h3>
                                <div class="flex gap-4">
                                    <button onclick="addQuizField('abcd')" class="btn-primary !py-4 !px-8 !text-[10px]">+ ABCD</button>
                                    <button onclick="addQuizField('write')" class="btn-primary !py-4 !px-8 !text-[10px]">+ Pisemne</button>
                                </div>
                            </div>
                            <div id="quiz-builder" class="space-y-8"></div>
                        </div>

                        <div class="flex gap-8 pt-10">
                            <button onclick="saveNote(${editId})" class="flex-[3] btn-primary py-10 rounded-[2.5rem] text-3xl">Zapisz Wszystko</button>
                            <button onclick="renderHome()" class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-[2.5rem] font-black uppercase text-xs tracking-widest">Anuluj</button>
                        </div>
                    </div>
                </div>`;
            if(data?.quiz) data.quiz.forEach(q => addQuizField(q.type, q));
        }

        function addQuizField(type, data = null) {
            const b = document.getElementById('quiz-builder');
            const d = document.createElement('div');
            d.className = "p-10 bg-slate-50 dark:bg-slate-800/50 rounded-[3.5rem] relative border-4 border-dashed border-slate-200 dark:border-slate-700 page-enter";
            d.dataset.type = type;
            d.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-8 right-10 text-red-500 font-black text-xs uppercase hover:underline">Usuń</button>
                <div class="text-[10px] font-black uppercase opacity-30 mb-6 tracking-[0.3em]">${type === 'abcd' ? 'Wielokrotny Wybór' : 'Pytanie Otwarte'}</div>
                <input placeholder="Treść pytania..." value="${data?.question || ''}" class="w-full mb-6 q-q text-2xl font-bold p-6 rounded-2xl bg-white dark:bg-slate-900 border-none shadow-sm">
                <input placeholder="Poprawna odpowiedź" value="${data?.correct || ''}" class="w-full q-c font-bold p-6 bg-green-50 dark:bg-green-900/20 text-green-700 rounded-2xl border-none shadow-sm">
                ${type === 'abcd' ? `
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <input placeholder="Zła opcja 1" value="${data?.options ? data.options[1]||'' : ''}" class="q-w p-4 rounded-xl dark:bg-slate-900 border-none shadow-inner">
                        <input placeholder="Zła opcja 2" value="${data?.options ? data.options[2]||'' : ''}" class="q-w p-4 rounded-xl dark:bg-slate-900 border-none shadow-inner">
                    </div>` : ''}`;
            b.appendChild(d);
        }

        function saveNote(editId) {
            const t = document.getElementById('f-title').value;
            const s = document.getElementById('f-subject').value;
            const ty = document.getElementById('f-type').value;
            const c = document.getElementById('f-content').value;
            const sum = document.getElementById('f-summary').value;

            if(!t || !c) return showToast("Uzupełnij tytuł i treść!");

            const qArr = [];
            document.querySelectorAll('#quiz-builder > div').forEach(el => {
                const qType = el.dataset.type;
                const question = el.querySelector('.q-q').value;
                const correct = el.querySelector('.q-c').value;
                if(qType === 'abcd') {
                    const ws = Array.from(el.querySelectorAll('.q-w')).map(i => i.value);
                    qArr.push({ type: 'abcd', question, correct, options: [correct, ...ws].filter(x => x) });
                } else { qArr.push({ type: 'write', question, correct }); }
            });

            const entry = { id: editId || Date.now(), title: t, subject: s, type: ty, content: c, summary: sum, quiz: qArr };
            if(ty === 'slowka') {
                entry.words = c.split('\n').filter(l => l.includes('-')).map(l => {
                    const p = l.split('-'); return { pl: p[0].trim(), en: p[1].trim() };
                });
            }

            if(editId) db[db.findIndex(x => x.id === editId)] = entry;
            else db.push(entry);

            saveDB(); showToast("Zapisano!"); renderSubject(s);
        }

        // --- SYSTEM ---
        function openExport() { 
            document.getElementById('export-modal').classList.remove('hidden'); 
            document.getElementById('export-area').value = JSON.stringify(db, null, 2); 
        }
        function closeExport() { document.getElementById('export-modal').classList.add('hidden'); }
        function copyData() { const a = document.getElementById('export-area'); a.select(); document.execCommand('copy'); showToast("Skopiowano!"); }
        function importData() { 
            try { 
                const d = JSON.parse(document.getElementById('export-area').value); 
                if(confirm("Nadpisać bazę?")) { db = d; saveDB(); location.reload(); } 
            } catch(e) { showToast("Błędny JSON!"); } 
        }
        function deleteNote(id) { 
            if(confirm("Usunąć bezpowrotnie?")) { 
                db = db.filter(i => i.id !== id); saveDB(); renderHome(); 
            } 
        }

        renderHome();
    </script>
</body>
</html>
