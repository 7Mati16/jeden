<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminarz Szkolny 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-6">
            <div class="flex items-center gap-4">
                <h1 id="month-display" class="text-3xl font-bold tracking-tight min-w-[200px]">Marzec 2026</h1>
                <div class="flex bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Dodaj sprawdzian
            </button>
        </div>

        <div class="grid calendar-grid gap-2 mb-2 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">
            <div>Pon</div><div>Wt</div><div>Śr</div><div>Czw</div><div>Pt</div><div>Sob</div><div>Ndz</div>
        </div>

        <div id="calendar-grid" class="grid calendar-grid gap-2">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">Nowy sprawdzian</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="exam-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">Przedmiot</label>
                    <input type="text" id="subject" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="np. Biologia">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">Data</label>
                    <input type="date" id="date" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">Zakres materiału</label>
                    <textarea id="topic" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Rozdział 4..."></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-shadow shadow-lg shadow-indigo-200">Zapisz termin</button>
            </form>
        </div>
    </div>

    <script>
        let currentViewDate = new Date(); // Przechowuje aktualnie wyświetlany miesiąc
        let exams = JSON.parse(localStorage.getItem('exams')) || [];

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();

            // Nazwa miesiąca
            const monthName = new Intl.DateTimeFormat('pl-PL', { month: 'long', year: 'numeric' }).format(currentViewDate);
            monthDisplay.innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);

            // Obliczenia dat
            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Korekta dla polskiego tygodnia (Poniedziałek jako 1, Niedziela jako 0)
            let startingDay = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            // Puste komórki przed początkiem miesiąca
            for (let i = 0; i < startingDay; i++) {
                grid.innerHTML += `<div class="h-32 rounded-2xl bg-slate-100/50"></div>`;
            }

            // Dni miesiąca
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const dayExams = exams.filter(e => e.date === dateStr);

                grid.innerHTML += `
                    <div class="h-32 bg-white rounded-2xl border ${isToday ? 'border-indigo-500 ring-1 ring-indigo-500' : 'border-slate-200'} p-2 flex flex-col group overflow-hidden">
                        <span class="text-sm font-bold ${isToday ? 'text-indigo-600' : 'text-slate-400'}">${day}</span>
                        <div class="mt-1 space-y-1 overflow-y-auto hide-scrollbar flex-grow">
                            ${dayExams.map(exam => `
                                <div onclick="deleteExam('${exam.id}')" class="text-[10px] bg-indigo-50 text-indigo-700 p-1 rounded border border-indigo-100 cursor-pointer hover:bg-red-50 hover:text-red-600 transition-colors truncate" title="Kliknij by usunąć: ${exam.topic}">
                                    <b>${exam.subject}</b>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderCalendar();
        }

        function openModal() { document.getElementById('modal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }

        document.getElementById('exam-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newExam = {
                id: Date.now().toString(),
                subject: document.getElementById('subject').value,
                date: document.getElementById('date').value,
                topic: document.getElementById('topic').value
            };
            exams.push(newExam);
            localStorage.setItem('exams', JSON.stringify(exams));
            e.target.reset();
            closeModal();
            renderCalendar();
        });

        function deleteExam(id) {
            if(confirm('Usunąć ten wpis?')) {
                exams = exams.filter(e => e.id !== id);
                localStorage.setItem('exams', JSON.stringify(exams));
                renderCalendar();
            }
        }

        renderCalendar();
    </script>
</body>
</html>
