<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminarz Szkolny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Terminarz Szkolny</h1>
                <p class="text-slate-500">Zarządzaj swoimi sprawdzianami i zadaniami.</p>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Dodaj sprawdzian
            </button>
        </div>

        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-5 lg:grid-cols-7 gap-4">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">Nowy sprawdzian</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="exam-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Przedmiot</label>
                    <input type="text" id="subject" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="np. Matematyka">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Data</label>
                    <input type="date" id="date" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Zakres materiału</label>
                    <textarea id="topic" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Opcjonalny opis..."></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">Zapisz w terminarzu</button>
            </form>
        </div>
    </div>

    <script>
        let exams = JSON.parse(localStorage.getItem('exams')) || [];

        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const startOfWeek = getStartOfWeek(new Date());

            for (let i = 0; i < 7; i++) {
                const currentDay = new Date(startOfWeek);
                currentDay.setDate(startOfWeek.getDate() + i);
                
                const dateString = currentDay.toISOString().split('T')[0];
                const isToday = new Date().toDateString() === currentDay.toDateString();

                const dayExams = exams.filter(e => e.date === dateString);

                grid.innerHTML += `
                    <div class="bg-white rounded-2xl border ${isToday ? 'border-indigo-500 ring-1 ring-indigo-500' : 'border-slate-200'} min-h-[200px] flex flex-col">
                        <div class="p-4 border-b border-slate-50 ${isToday ? 'bg-indigo-50' : ''} rounded-t-2xl">
                            <p class="text-xs font-bold uppercase tracking-wider ${isToday ? 'text-indigo-600' : 'text-slate-400'}">
                                ${currentDay.toLocaleDateString('pl-PL', { weekday: 'short' })}
                            </p>
                            <p class="text-lg font-bold">${currentDay.getDate()}</p>
                        </div>
                        <div class="p-3 space-y-2 flex-grow overflow-y-auto hide-scrollbar">
                            ${dayExams.map(exam => `
                                <div class="group relative bg-slate-50 p-3 rounded-xl border border-slate-100 hover:border-indigo-200 transition-all">
                                    <p class="font-bold text-sm text-indigo-900">${exam.subject}</p>
                                    <p class="text-xs text-slate-500 leading-tight mt-1">${exam.topic}</p>
                                    <button onclick="deleteExam('${exam.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
            return new Date(d.setDate(diff));
        }

        function openModal() { document.getElementById('modal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.body.classList.remove('overflow-hidden'); document.getElementById('modal').classList.replace('flex', 'hidden'); }

        document.getElementById('exam-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newExam = {
                id: Date.now().toString(),
                subject: document.getElementById('subject').value,
                date: document.getElementById('date').value,
                topic: document.getElementById('topic').value
            };
            exams.push(newExam);
            localStorage.setItem('exams', JSON.stringify(exams));
            e.target.reset();
            closeModal();
            initCalendar();
        });

        function deleteExam(id) {
            exams = exams.filter(e => e.id !== id);
            localStorage.setItem('exams', JSON.stringify(exams));
            initCalendar();
        }

        initCalendar();
    </script>
</body>
</html>
